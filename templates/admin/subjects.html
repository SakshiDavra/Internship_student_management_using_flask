{% include 'layout/header.html' %}
<div class="container mt-4">
  <div class="soft-card">

    <h5 class="soft-title">Manage Subjects</h5>

    <form method="post" class="row g-3 mb-4">

      <div class="col-md-3">
        <input class="form-control"
               name="subject_name"
               placeholder="Subject Name"
               required>
      </div>

      <div class="col-md-2">
        <input type="number"
               class="form-control"
               name="max_marks"
               placeholder="Max Marks"
               required>
      </div>

      <div class="col-md-3">
        <select name="course_id" class="form-control" required>
          <option value="">Select Course</option>
          {% for c in courses %}
            <option value="{{ c.id }}">{{ c.course_name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-2">
        <select name="year_id" class="form-control" required>
          <option value="">Year</option>
          {% for y in years %}
            <option value="{{ y.id }}">
              {{ y.course.course_name }} - Year {{ y.year_no }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-2">
        <button class="btn btn-main w-100">Add</button>
      </div>

    </form>

    <!-- SUBJECT LIST -->
    <div class="card p-3">
      <table class="table soft-table">
        <thead>
          <tr>
            <th>Subject</th>
            <th>Course</th>
            <th>Year</th>
            <th>Max Marks</th>
          </tr>
        </thead>
        <tbody>
          {% for s in subjects %}
          <tr>
            <td>{{ s.subject_name }}</td>
            <td>{{ s.course.course_name }}</td>
            <td>Year {{ s.year.year_no }}</td>
            <td>{{ s.max_marks }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

  </div>
</div>
