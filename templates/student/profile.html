{% include 'layout/header.html' %}

<div class="container mt-4">
  <div class="card mx-auto" style="max-width:600px;">
    <div class="card-body text-center">

      {% if student.photo %}
        <img src="{{ url_for('student.student_photo', student_id=student.id) }}"
            class="rounded-circle mb-3"
            width="120"
            height="120">
        {% else %}
        <i class="bi bi-person-circle fs-1 text-muted"></i>
        {% endif %}


      <h5>{{ student.name }}</h5>
      <p class="text-muted">{{ student.user.username }}</p>

      <form method="POST"  enctype="multipart/form-data">
        <input type="file" name="photo" class="form-control mb-3" accept="image/*">
        <button class="btn btn-main w-100">Update Profile</button>
      </form>

    </div>
  </div>
</div>
